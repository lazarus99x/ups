<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Shield -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C40A"/>
      <stop offset="100%" stop-color="#D4A104"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M200 30 L340 100 L340 220 C340 310 200 370 200 370 C200 370 60 310 60 220 L60 100 Z"
        fill="#4B2E06" stroke="url(#gold)" stroke-width="4"/>

  <!-- Inner shield border -->
  <path d="M200 50 L320 110 L320 215 C320 290 200 345 200 345 C200 345 80 290 80 215 L80 110 Z"
        fill="#3A2205" stroke="#F5C40A" stroke-width="1.5" opacity="0.6"/>

  <!-- Stylized A monogram -->
  <path d="M200 95 L150 220 L170 220 L180 195 L220 195 L230 220 L250 220 Z"
        fill="url(#gold)"/>

  <!-- A crossbar -->
  <rect x="175" y="185" width="50" height="8" rx="2" fill="url(#gold)"/>

  <!-- Apex glow -->
  <circle cx="200" cy="105" r="4" fill="#F5C40A" opacity="0.8"/>

  <!-- Globe lines behind A -->
  <ellipse cx="200" cy="155" rx="38" ry="12" fill="none" stroke="#F5C40A" stroke-width="1" opacity="0.3"/>
  <ellipse cx="200" cy="155" rx="20" ry="30" fill="none" stroke="#F5C40A" stroke-width="1" opacity="0.3"/>

  <!-- Small star accent -->
  <polygon points="200,82 203,92 214,92 206,98 209,108 200,102 191,108 194,98 186,92 197,92"
           fill="#F5C40A" opacity="0.9"/>

  <!-- Text: AVALON -->
  <text x="200" y="250" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="900" fill="#4B2E06" letter-spacing="8">
    AVALON
  </text>

  <!-- Text: TRUST -->
  <text x="200" y="285" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="30" font-weight="700" fill="#F5C40A" letter-spacing="12">
    TRUST
  </text>

  <!-- Text: HOLDINGS -->
  <text x="200" y="318" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="16" font-weight="600" fill="#4B2E06" letter-spacing="14" opacity="0.7">
    HOLDINGS
  </text>

  <!-- Decorative line under AVALON -->
  <line x1="100" y1="260" x2="300" y2="260" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>
</svg>